<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Dynamic Slicer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client/dist/powerbi.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0f1117;--panel:#13151c;--card:#1e2130;
      --border:#2a2d3e;--cyan:#00d4ff;--lime:#76ff03;
      --orange:#ff7043;--text:#e2e4f0;--dim:#6b6e8a;
    }
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;}

    /* top nav */
    nav{
      background:var(--panel);border-bottom:1px solid var(--border);
      padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    }
    .nav-left{display:flex;align-items:center;gap:16px;}
    .nav-title{font-size:15px;font-weight:600;color:var(--cyan);}
    .nav-btn{
      padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;
      text-decoration:none;border:1px solid var(--border);color:var(--dim);
      transition:all .2s;
    }
    .nav-btn:hover{color:var(--text);border-color:var(--cyan);}
    .nav-btn.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,212,255,.08);}

    /* status bar */
    #status-bar{
      background:var(--card);border-bottom:1px solid var(--border);
      padding:8px 24px;display:flex;align-items:center;gap:10px;font-size:13px;
      color:var(--dim);flex-shrink:0;
    }
    .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0;}
    .dot.green{background:var(--lime);}
    .dot.amber{background:var(--orange);}
    .dot.red{background:#ff4081;}

    /* slicer badges */
    #badges{
      background:var(--panel);border-bottom:1px solid var(--border);
      padding:8px 24px;display:flex;gap:8px;flex-shrink:0;
    }
    .badge{
      padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;
      border:1px solid var(--border);color:var(--dim);background:var(--card);
    }
    .badge.on{color:#0f1117;background:var(--lime);border-color:var(--lime);}
    .badge.off{color:#ff4081;border-color:#ff4081;background:rgba(255,64,129,.1);}

    /* report area */
    #reportContainer{flex:1;min-height:0;}

    /* loading overlay */
    #loader{
      position:absolute;inset:0;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
      font-size:14px;color:var(--dim);
    }
    .spinner{
      width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--cyan);border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <span class="nav-title">⚡ RishabhPulse</span>
    <a href="/" class="nav-btn">Page 1 — AI Query</a>
    <a href="/slicer2" class="nav-btn active">Page 2 — Dynamic Slicer</a>
  </div>
</nav>

<div id="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Connecting...</span>
</div>

<div id="badges">
  <span class="badge" id="b1">Slicer 1: —</span>
  <span class="badge" id="b2">Slicer 2: —</span>
  <span class="badge off" id="b3">Slicer 3: hidden</span>
</div>

<div style="position:relative;flex:1;min-height:0;">
  <div id="loader">
    <div class="spinner"></div>
    <span>Loading report...</span>
  </div>
  <div id="reportContainer" style="height:100%;"></div>
</div>

<script>
  const models = window['powerbi-client'].models;
  let slicer1 = null, slicer2 = null, slicer3 = null;

  function setStatus(msg, color) {
    document.getElementById('status-text').textContent = msg;
    document.getElementById('dot').className = 'dot ' + (color || '');
  }

  function setBadge(id, label, state) {
    // state: 'on' | 'off' | ''
    const el = document.getElementById(id);
    el.textContent = label;
    el.className = 'badge ' + (state || '');
  }

  async function init() {
    setStatus('Fetching embed token...', '');

    const res = await fetch('/pbi-embed-token-2');
    const data = await res.json();

    if (data.error) {
      setStatus('Token error: ' + data.error, 'red');
      document.getElementById('loader').innerHTML =
        `<span style="color:#ff4081">❌ ${data.error}</span>`;
      return;
    }

    const report = powerbi.embed(
      document.getElementById('reportContainer'),
      {
        type: 'report',
        id: data.report_id,
        embedUrl: data.embed_url,
        accessToken: data.token,
        tokenType: models.TokenType.Embed,
        settings: {
          filterPaneEnabled: false,
          navContentPaneEnabled: false
        }
      }
    );

    report.on('rendered', async () => {
      document.getElementById('loader').style.display = 'none';
      setStatus('Report loaded — finding slicers...', 'amber');

      try {
        const pages  = await report.getPages();
        const page   = pages.find(p => p.isActive);
        const visuals = await page.getVisuals();

        // ── OPEN BROWSER CONSOLE (F12) TO SEE YOUR EXACT SLICER NAMES ──
        console.log('=== ALL VISUALS ===');
        visuals.forEach(v =>
          console.log(`type: ${v.type} | title: "${v.title}" | name: "${v.name}"`)
        );

        const slicers = visuals.filter(v => v.type === 'slicer');
        console.log('=== SLICER TITLES ===', slicers.map(s => s.title));

        // ⚠️ CHANGE THESE to match what you see in console exactly
        slicer1 = slicers.find(s => s.title === 'Program');
        slicer2 = slicers.find(s => s.title === 'Year');
        slicer3 = slicers.find(s => s.title === 'Month-Quarter');

        if (!slicer1 || !slicer2 || !slicer3) {
          const found = slicers.map(s => `"${s.title}"`).join(', ');
          setStatus(`❌ Slicer not found. Found: ${found} — update titles in slicer2.html`, 'red');
          return;
        }

        // Hide slicer 3 immediately on load
        await slicer3.setVisualDisplayState(
          models.VisualContainerDisplayMode.Hidden
        );

        setBadge('b1', 'Slicer 1: none', '');
        setBadge('b2', 'Slicer 2: none', '');
        setBadge('b3', 'Slicer 3: hidden', 'off');
        setStatus('Ready — select Slicer 1 AND Slicer 2 to reveal Slicer 3', 'green');

      } catch(err) {
        setStatus('Error: ' + err.message, 'red');
        console.error(err);
      }
    });

    // Fires on every slicer click
    report.on('dataSelected', () => checkAndToggle());
    report.on('filtersApplied', () => checkAndToggle());
  }

  async function checkAndToggle() {
    if (!slicer1 || !slicer2 || !slicer3) return;

    try {
      const [st1, st2] = await Promise.all([
        slicer1.getSlicerState(),
        slicer2.getSlicerState()
      ]);

      const s1on = st1.filters && st1.filters.length > 0;
      const s2on = st2.filters && st2.filters.length > 0;
      const show = s1on && s2on;

      // THE ACTUAL SDK CALL — physically shows or hides slicer 3
      await slicer3.setVisualDisplayState(
        show
          ? models.VisualContainerDisplayMode.Visible
          : models.VisualContainerDisplayMode.Hidden
      );

      // Update badges
      const v1 = s1on && st1.filters[0].values ? st1.filters[0].values.join(', ') : '—';
      const v2 = s2on && st2.filters[0].values ? st2.filters[0].values.join(', ') : '—';
      setBadge('b1', `Slicer 1: ${v1}`, s1on ? 'on' : '');
      setBadge('b2', `Slicer 2: ${v2}`, s2on ? 'on' : '');
      setBadge('b3', show ? 'Slicer 3: visible ✓' : 'Slicer 3: hidden', show ? 'on' : 'off');

      setStatus(
        show
          ? '✓ Both selected — Slicer 3 is now visible on the report'
          : `Select both slicers → Slicer1: ${s1on?'✓':'✗'}  Slicer2: ${s2on?'✓':'✗'}`,
        show ? 'green' : 'amber'
      );

    } catch(err) {
      console.error('toggle error:', err);
    }
  }

  init();
</script>
</body>
</html>
