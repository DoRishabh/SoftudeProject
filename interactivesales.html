<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interactive Sales — RishabhPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/powerbi-client/dist/powerbi.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--panel:#13151c;--card:#1e2130;--card2:#252838;
  --border:#2a2d3e;--border2:#353850;
  --cyan:#00d4ff;--lime:#76ff03;--orange:#ff7043;--purple:#7c4dff;
  --pink:#ff4081;--green:#00e676;
  --text:#e2e4f0;--dim:#6b6e8a;--dimmer:#3a3d52;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:46px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;}
.logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;}
.logo span{color:var(--cyan);}
.nav-links{display:flex;gap:6px;}
.nav-btn{font-family:'Space Mono',monospace;font-size:10px;padding:4px 12px;border-radius:4px;border:1px solid var(--border);color:var(--dim);text-decoration:none;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--text);border-color:var(--border2);}
.nav-btn.active{color:var(--cyan);border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.06);}

/* page switcher bar */
.pagebar{display:flex;align-items:center;gap:8px;padding:0 20px;height:38px;background:var(--card2);border-bottom:1px solid var(--border);flex-shrink:0;}
.pagebar-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--dimmer);margin-right:4px;}
.page-btn{font-family:'Space Mono',monospace;font-size:10px;padding:3px 12px;border-radius:3px;border:1px solid var(--border);color:var(--dim);background:var(--card);cursor:pointer;transition:all .2s;white-space:nowrap;}
.page-btn:hover{color:var(--text);border-color:var(--border2);}
.page-btn.active{color:var(--lime);border-color:rgba(118,255,3,0.35);background:rgba(118,255,3,0.06);}
.page-btn:disabled{opacity:0.3;cursor:not-allowed;}

.statusbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:34px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dimmer);flex-shrink:0;}
.dot.green{background:var(--lime);box-shadow:0 0 6px var(--lime);}
.dot.amber{background:var(--orange);}
.dot.red{background:var(--pink);}

#reportContainer{flex:1;min-height:0;background:#fff;opacity:0;transition:opacity .4s;}
#reportContainer.ready{opacity:1;}
#loader{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:13px;color:var(--dim);z-index:10;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topnav">
  <div class="logo">
    <div class="logo-icon">R</div>
    <div>Rishabh<span>Pulse</span></div>
  </div>
  <div class="nav-links">
    <a href="/"                  class="nav-btn">AI QUERY</a>
    <a href="/slicer2"           class="nav-btn">DYNAMIC SLICER</a>
    <a href="/usmap"             class="nav-btn">US MAP</a>
    <a href="/interactivesales"  class="nav-btn active">INTERACTIVE SALES</a>
    <a href="/yearendmedals"     class="nav-btn">YEAR END MEDALS</a>
  </div>
</div>

<!-- report page switcher -->
<div class="pagebar">
  <span class="pagebar-label">REPORT PAGE:</span>
  <button class="page-btn active" id="pb-0" onclick="switchToPage(0)" disabled>Sales Overview</button>
  <button class="page-btn"        id="pb-1" onclick="switchToPage(1)" disabled>Interactive Sales Analysis</button>
  <button class="page-btn"        id="pb-2" onclick="switchToPage(2)" disabled>Sales Forecast &amp; Bikes</button>
</div>

<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Connecting...</span>
</div>

<div style="position:relative;flex:1;min-height:0;">
  <div id="loader"><div class="spinner"></div><span>Loading Interactive Sales report...</span></div>
  <div id="reportContainer" style="height:100%;"></div>
</div>

<script>
const models = window['powerbi-client'].models;
let reportPages = [];   // will hold actual page objects from SDK
let currentPage = 0;
let reportReady = false;

function setStatus(msg, color) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('dot').className = 'dot ' + (color || '');
}

function setActivePageBtn(idx) {
  [0,1,2].forEach(i => {
    const btn = document.getElementById('pb-' + i);
    if (btn) btn.className = 'page-btn' + (i === idx ? ' active' : '');
  });
  currentPage = idx;
}

async function switchToPage(idx) {
  if (!reportPages[idx]) return;
  setStatus(`Switching to page ${idx + 1}...`, 'amber');
  try {
    await reportPages[idx].setActive();
    setActivePageBtn(idx);
    setStatus(`✓ ${reportPages[idx].displayName}`, 'green');
  } catch(e) {
    setStatus('Page switch error: ' + e.message, 'red');
    console.error(e);
  }
}

async function init() {
  setStatus('Fetching embed token...', '');

  const res  = await fetch('/pbi-embed-token-4');
  const data = await res.json();

  if (data.error) {
    setStatus('Token error: ' + data.error, 'red');
    document.getElementById('loader').innerHTML =
      `<span style="color:#ff4081">❌ ${data.error}</span>`;
    return;
  }

  const report = powerbi.embed(
    document.getElementById('reportContainer'),
    {
      type: 'report',
      id: data.report_id,
      embedUrl: data.embed_url,
      accessToken: data.token,
      tokenType: models.TokenType.Embed,
      settings: { filterPaneEnabled: false, navContentPaneEnabled: false }
    }
  );

  report.on('rendered', async () => {
    if (reportReady) return;
    reportReady = true;

    document.getElementById('loader').style.display = 'none';
    document.getElementById('reportContainer').classList.add('ready');
    setStatus('Report loaded — reading pages...', 'amber');

    try {
      // get actual pages from the report
      reportPages = await report.getPages();
      console.log('Report pages:', reportPages.map(p => p.displayName));

      // enable buttons and update labels with real page names
      reportPages.forEach((page, i) => {
        const btn = document.getElementById('pb-' + i);
        if (btn) {
          btn.textContent = page.displayName;
          btn.disabled = false;
        }
      });

      // mark whichever page is currently active
      const activeIdx = reportPages.findIndex(p => p.isActive);
      if (activeIdx >= 0) setActivePageBtn(activeIdx);

      setStatus(`✓ Interactive Sales loaded — ${reportPages.length} pages`, 'green');

    } catch(e) {
      setStatus('Error reading pages: ' + e.message, 'red');
      console.error(e);
    }
  });

  report.on('error', (e) => {
    setStatus('Error: ' + JSON.stringify(e.detail), 'red');
    console.error(e);
  });
}

init();
</script>
</body>
</html>
