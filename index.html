<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RishabhPulse — AI Query + Power BI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--panel:#13151c;--card:#1e2130;--card2:#252838;
  --border:#2a2d3e;--border2:#353850;
  --cyan:#00d4ff;--lime:#76ff03;--orange:#ff7043;--purple:#7c4dff;
  --pink:#ff4081;--green:#00e676;
  --text:#e2e4f0;--dim:#6b6e8a;--dimmer:#3a3d52;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:46px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;}
.logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;}
.logo span{color:var(--cyan);}
.nav-right{display:flex;align-items:center;gap:12px;}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'Space Mono',monospace;color:var(--dim);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pbi-push-badge{font-family:'Space Mono',monospace;font-size:9px;padding:3px 10px;border-radius:3px;background:rgba(118,255,3,0.1);border:1px solid rgba(118,255,3,0.2);color:var(--lime);display:none;}
.pbi-push-badge.show{display:inline-block;}
.main-body{flex:1;display:flex;overflow:hidden;}
.pbi-panel{flex:1;display:flex;flex-direction:column;border-right:2px solid var(--border2);}
.pbi-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--card2);border-bottom:1px solid var(--border);flex-shrink:0;}
.pbi-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
.pbi-badge{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);background:var(--panel);border:1px solid var(--border);padding:2px 8px;border-radius:3px;}
.pbi-status{font-family:'Space Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);color:var(--cyan);display:none;}
.pbi-status.show{display:inline-block;}
.open-btn{background:var(--cyan);color:#000;padding:4px 12px;border-radius:4px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;}
iframe{flex:1;width:100%;border:none;display:block;}
.query-panel{width:420px;flex-shrink:0;display:flex;flex-direction:column;background:var(--panel);overflow:hidden;}
.qp-header{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card2);flex-shrink:0;}
.qp-title{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:8px;}
.cache-badge{font-family:'Space Mono',monospace;font-size:9px;color:var(--purple);background:rgba(124,77,255,0.1);border:1px solid rgba(124,77,255,0.2);padding:2px 7px;border-radius:3px;}
.qp-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.query-row{display:flex;gap:8px;align-items:center;}
.query-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.3s;}
.query-input:focus{border-color:var(--cyan);}
.query-input::placeholder{color:var(--dimmer);}
.run-btn{background:var(--cyan);color:#000;border:none;padding:9px 18px;font-size:12px;font-weight:700;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;}
.run-btn:hover{box-shadow:0 0 16px rgba(0,212,255,0.35);}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;}
.quick-label{font-size:10px;color:var(--dimmer);font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:6px;}
.quick-btns{display:flex;gap:5px;flex-wrap:wrap;}
.qbtn{background:var(--card);border:1px solid var(--border);color:var(--dim);padding:4px 10px;font-size:11px;border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.qbtn:hover{color:var(--text);border-color:var(--border2);}
.flow-box{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:'Space Mono',monospace;font-size:10px;line-height:2;display:none;}
.flow-box.show{display:block;}
.flow-step.done{color:var(--lime);}
.flow-step.active{color:var(--cyan);animation:blink 1s infinite;}
.flow-step.pending{color:var(--dimmer);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.result-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card2);border-bottom:1px solid var(--border);}
.result-q{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.result-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px;}
.tag-cached{font-family:'Space Mono',monospace;font-size:9px;color:var(--lime);background:rgba(118,255,3,0.1);border:1px solid rgba(118,255,3,0.2);padding:2px 7px;border-radius:3px;}
.tag-live{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);}
.tag-rows{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);}
.result-body{padding:10px;}
.chart-outer{width:100%;height:170px;background:var(--bg);border-radius:4px;overflow:hidden;}
#chart-canvas-area{display:block;}
.sql-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px 10px;font-family:'Space Mono',monospace;font-size:10px;color:#6b8aff;white-space:pre-wrap;word-break:break-all;max-height:70px;overflow-y:auto;margin-top:8px;line-height:1.6;}
.err-box{color:#ff80aa;font-family:'Space Mono',monospace;font-size:11px;background:rgba(255,64,129,0.05);border:1px solid rgba(255,64,129,0.3);border-radius:6px;padding:10px 12px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--cyan);}
</style>
</head>
<body>

<div class="topnav">
  <div class="logo">
    <div class="logo-icon">R</div>
    <div>Rishabh<span>Pulse</span></div>
  </div>
  <div class="nav-right">
    <span class="pbi-push-badge" id="push-badge">✓ PUSHED TO POWER BI</span>
    <div class="live-badge"><div class="live-dot"></div>SNOWFLAKE LIVE</div>
  </div>
</div>

<div class="main-body">

  <!-- LEFT — POWER BI STATIC EMBED — no reload tricks -->
  <div class="pbi-panel">
    <div class="pbi-header">
      <div class="pbi-title">
        AI Query Results — Power BI
        <span class="pbi-badge">LIVE STREAMING</span>
        <span class="pbi-status" id="pbi-status">Waiting for query...</span>
      </div>
      <a class="open-btn" href="https://app.powerbi.com/view?r=eyJrIjoiODhlZGRjZWItMWY2Zi00NjAxLWE3MjYtYTQ0OTVlNDYxZTk2IiwidCI6IjZiMjk0YWIxLWVmODYtNDIwZS1hZDlkLWYzNzM0MzhlMjFkMiJ9" target="_blank">Open Full ↗</a>
    </div>
    <iframe
      id="pbi-frame"
      title="AI Query Results"
      src="https://app.powerbi.com/view?r=eyJrIjoiODhlZGRjZWItMWY2Zi00NjAxLWE3MjYtYTQ0OTVlNDYxZTk2IiwidCI6IjZiMjk0YWIxLWVmODYtNDIwZS1hZDlkLWYzNzM0MzhlMjFkMiJ9"
      allowFullScreen="true">
    </iframe>
  </div>

  <!-- RIGHT — QUERY PANEL -->
  <div class="query-panel">
    <div class="qp-header">
      <div class="qp-title">AI Query Engine <span class="cache-badge">CACHE</span></div>
    </div>
    <div class="qp-body">

      <div class="query-row">
        <input class="query-input" id="question" type="text"
          placeholder="Ask a business question..."
          onkeydown="if(event.key==='Enter') ask()"/>
        <button class="run-btn" id="run-btn" onclick="ask()">▶ RUN</button>
      </div>

      <div>
        <div class="quick-label">QUICK QUERIES</div>
        <div class="quick-btns">
          <button class="qbtn" onclick="quick('Top 10 products by total sales amount')">Top products</button>
          <button class="qbtn" onclick="quick('Total sales by territory region')">By territory</button>
          <button class="qbtn" onclick="quick('Top 10 customers by total sales amount')">Top customers</button>
          <button class="qbtn" onclick="quick('Total sales by product category')">By category</button>
          <button class="qbtn" onclick="quick('Sales amount by country')">By country</button>
          <button class="qbtn" onclick="quick('Total sales by product subcategory')">By subcategory</button>
        </div>
      </div>

      <div class="flow-box" id="flow-box">
        <div class="flow-step" id="f1">▸ Parsing question</div>
        <div class="flow-step" id="f2">▸ Generating SQL via Groq</div>
        <div class="flow-step" id="f3">▸ Querying Snowflake</div>
        <div class="flow-step" id="f4">▸ Pushing to Power BI</div>
        <div class="flow-step" id="f5">▸ Rendering chart</div>
      </div>

      <div class="result-card" id="result-card" style="display:none;">
        <div class="result-header">
          <span class="result-q" id="result-q">—</span>
          <div class="result-meta">
            <span id="result-tag"></span>
            <span class="tag-rows" id="result-rows">0 rows</span>
          </div>
        </div>
        <div class="result-body">
          <div class="chart-outer">
            <canvas id="chart-canvas-area" width="380" height="170"></canvas>
          </div>
          <div class="sql-box" id="sql-box"></div>
        </div>
      </div>

      <div class="err-box" id="err-box" style="display:none;"></div>

    </div>
  </div>

</div>

<script>
const API   = 'https://softudeproject.onrender.com/query';
const CACHE = {};
const PAL   = ['#00d4ff','#ff7043','#76ff03','#7c4dff','#ff4081','#ffd740','#00e676','#00b4a0','#ff6d00','#b388ff','#69f0ae','#40c4ff','#ff6e40','#ea80fc','#ccff90'];
const GC    = 'rgba(42,45,62,0.8)';
const TC    = '#4a4d6a';
const TT    = {
  backgroundColor:'#1e2130',borderColor:'#2a2d3e',borderWidth:1,
  titleColor:'#e2e4f0',bodyColor:'#8a8da0',padding:10,cornerRadius:6,
  callbacks:{label:ctx=>' '+fmtN(ctx.parsed.y!==undefined?ctx.parsed.y:ctx.parsed)}
};

const chart = new Chart(document.getElementById('chart-canvas-area').getContext('2d'),{
  type:'bar',
  data:{labels:[],datasets:[{label:'Value',data:[],backgroundColor:[],borderColor:[],borderWidth:1.5,borderRadius:4}]},
  options:{
    responsive:false,animation:false,
    plugins:{legend:{display:false},tooltip:TT},
    scales:{
      x:{ticks:{color:TC,font:{size:9},maxRotation:35},grid:{color:GC},border:{color:'#2a2d3e'}},
      y:{ticks:{color:TC,font:{family:'Space Mono',size:9},callback:v=>fmtN(v)},grid:{color:GC},border:{color:'#2a2d3e',dash:[4,4]}}
    }
  }
});

function fmtN(n){
  n=parseFloat(n)||0;
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}

function quick(q){document.getElementById('question').value=q;ask();}

let flowTimer=null;
function startFlow(){
  document.getElementById('flow-box').classList.add('show');
  ['f1','f2','f3','f4','f5'].forEach(id=>document.getElementById(id).className='flow-step pending');
  let i=1;document.getElementById('f1').className='flow-step active';
  flowTimer=setInterval(()=>{
    if(i<=5)document.getElementById('f'+i).className='flow-step done';
    i++;
    if(i<=5)document.getElementById('f'+i).className='flow-step active';
    else clearInterval(flowTimer);
  },700);
}
function stopFlow(){clearInterval(flowTimer);}

function showErr(msg){
  document.getElementById('err-box').textContent=msg;
  document.getElementById('err-box').style.display='block';
  document.getElementById('result-card').style.display='none';
}
function hideErr(){document.getElementById('err-box').style.display='none';}

async function ask(){
  const q=document.getElementById('question').value.trim();
  if(!q)return;
  const key=q.toLowerCase();
  if(CACHE[key]){render(CACHE[key],q,true);return;}

  document.getElementById('run-btn').disabled=true;
  document.getElementById('push-badge').classList.remove('show');
  document.getElementById('pbi-status').textContent='Pushing to Power BI...';
  document.getElementById('pbi-status').classList.add('show');
  hideErr();startFlow();

  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    const json=await res.json();
    stopFlow();
    if(json.error){showErr('⚠ '+json.error);document.getElementById('pbi-status').classList.remove('show');return;}
    if(!json.data||!json.data.length){showErr('⚠ No data returned. Try rephrasing.');document.getElementById('pbi-status').classList.remove('show');return;}

    CACHE[key]=json;
    document.getElementById('push-badge').classList.add('show');
    document.getElementById('pbi-status').textContent='✓ Chart pushed to Power BI!';
    setTimeout(()=>document.getElementById('pbi-status').classList.remove('show'), 4000);

    render(json,q,false);

  }catch(e){
    stopFlow();
    showErr('⚠ Cannot reach API. Make sure server is running.');
    document.getElementById('pbi-status').classList.remove('show');
  }finally{
    document.getElementById('run-btn').disabled=false;
  }
}

function render(json,q,fromCache){
  const{columns,data,sql}=json;
  const sliced=data.slice(0,10);
  const labels=sliced.map(r=>{const v=String(r[columns[0]]);return v.length>16?v.substring(0,14)+'…':v;});
  const values=sliced.map(r=>parseFloat(r[columns[1]])||0);

  document.getElementById('result-card').style.display='block';
  document.getElementById('result-q').textContent=q;
  document.getElementById('result-rows').textContent=sliced.length+' rows';
  document.getElementById('result-tag').innerHTML=fromCache
    ?'<span class="tag-cached">CACHED</span>'
    :'<span class="tag-live">LIVE</span>';

  chart.data.labels=labels;
  chart.data.datasets[0].label=columns[1]||'Value';
  chart.data.datasets[0].data=values;
  chart.data.datasets[0].backgroundColor=PAL.slice(0,values.length).map(c=>c+'bb');
  chart.data.datasets[0].borderColor=PAL.slice(0,values.length);
  chart.update('none');

  const kw={SELECT:'#ff4081',FROM:'#ff7043',JOIN:'#00d4ff',ON:'#40c4ff',WHERE:'#76ff03','GROUP BY':'#76ff03','ORDER BY':'#76ff03',LIMIT:'#ffd740',SUM:'#ea80fc',COUNT:'#ea80fc',AVG:'#ea80fc'};
  let h=sql||'';
  Object.entries(kw).forEach(([k,c])=>{h=h.replace(new RegExp(`\\b${k}\\b`,'g'),`<span style="color:${c}">${k}</span>`);});
  document.getElementById('sql-box').innerHTML=h;
}

document.getElementById('question').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask();}
});
</script>
</body>
</html>
